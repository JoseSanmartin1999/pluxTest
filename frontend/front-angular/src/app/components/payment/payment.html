<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white shadow-lg rounded-xl w-full max-w-lg overflow-hidden">

    <div class="bg-purple-600 px-6 py-4">
      <h1 class="text-white text-xl font-semibold">
        Pagos Plux
      </h1>
    </div>

    <form [formGroup]="paymentForm" (ngSubmit)="submit()" class="space-y-4 p-8">

      <div>
        <label class="block text-sm font-medium">Número de tarjeta</label>
        <input type="text" formControlName="cardNumber" class="w-full border rounded-lg p-2 mt-1"
          placeholder="4242 4242 4242 4242" />
      </div>

      <div class="flex gap-4">
        <div class="w-1/2">
          <label class="block text-sm font-medium">Mes</label>
          <input type="text" formControlName="expMonth" class="w-full border rounded-lg p-2 mt-1" placeholder="MM" />
        </div>

        <div class="w-1/2">
          <label class="block text-sm font-medium">Año</label>
          <input type="text" formControlName="expYear" class="w-full border rounded-lg p-2 mt-1" placeholder="YY" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium">CVV</label>
        <input type="text" formControlName="cvv" class="w-full border rounded-lg p-2 mt-1" placeholder="123" />
      </div>

      <div>
        <label class="block text-sm font-medium">Nombre del cliente</label>
        <input type="text" formControlName="clientName" class="w-full border rounded-lg p-2 mt-1"
          placeholder="Juan Perez" />
      </div>

      <div>
        <label class="block text-sm font-medium">Email</label>
        <input type="email" formControlName="email" class="w-full border rounded-lg p-2 mt-1"
          placeholder="correo@email.com" />
      </div>

      <div>
        <label class="block text-sm font-medium">Monto</label>
        <input type="number" formControlName="amount" class="w-full border rounded-lg p-2 mt-1" placeholder="10.00" />
      </div>

      <div>
        <label class="block text-sm font-medium">Cuotas</label>
        <select formControlName="installments" class="w-full border rounded-lg p-2 mt-1">
          <option value="0">1 cuota</option>
          <option value="3">3 cuotas</option>
          <option value="6">6 cuotas</option>
          <option value="12">12 cuotas</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium">Descripción</label>
        <input type="text" formControlName="description" class="w-full border rounded-lg p-2 mt-1"
          placeholder="Compra en tienda" />
      </div>

      <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition">
        Pagar
      </button>

    </form>

  </div>
</div>
